<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendly Challenge Picker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      height: 100vh;
      background-color: #000000;
      text-align: center;
      padding: 20px;
    }
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #scenario {
      font-size: 1.5rem;
      margin: 30px;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 800px;
    }
    #selectBtn {
      background: none;
      border: none;
      cursor: pointer;
    }
    #selectBtn img {
      width: 120px;
    }
    #participants {
      width: 250px;
      text-align: left;
    }
    #participants input {
      width: 90%;
      margin: 5px 0;
      padding: 5px;
    }
    .participant-button {
      margin: 5px 0;
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }
    .participant-button:hover {
      background-color: #45a049;
    }
    .score-display {
      font-size: 0.9rem;
      color: #ffffff;
      display: inline-block;
      width: 100%;
      text-align: left;
    }
    #winnerDisplay {
      margin-top: 20px;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <h1><font color="ffffff">🎮 Friendly Challenge Scenarios</font></h1>
    <div id="scenario">Click the button to reveal your challenge!</div>
    <button id="selectBtn"><img src="select.png" alt="Select" /></button>
    <div id="winnerDisplay"></div>
  </div>

  <!-- <div id="participants">
    <h3><font color="ffffff"> Enter Participant Names:</font></h3>
    <input type="text" id="nameInput" placeholder="Enter name" />
    <button onclick="addParticipant()">Add</button>
    <div id="participantList"></div>
  </div> -->

  <script>
    const scenarios = [
      "1. 🎮 The Carried teammate: Your Mobile Legends squad just lost badly and everyone is blaming the one teammate who kept dying. The group chat is blowing up with hate. → How do you show up here without being a pushover?",
      "2. 📸 The Flop Era: You posted your best TikTok ever — spent 3 hours editing it — and it got 4 likes. Your friend's lazy video got 4,000. → What do you do next that isn't just deleting the app?",
      "3. 🎤 The Unexpected Solo: Your school's K-pop cover group suddenly has no centre for the performance tomorrow. Everyone looks at you — you've never performed solo before.  → How do you respond in that moment?",
      "4. 📚 The Study Group Outsider: There's a secret study group for the top students and you just found out you weren't invited — even though your grades are just as good.  → What's your move?",
      "5. 🖼️ The Copied Work: You spent a week on your art project. Your classmate clearly copied your idea and the teacher praised THEIR version. → How do you handle this without losing your cool?",
      "6. 🕹️ The Roblox Server Boss: You built an entire Roblox world and invited your friends. Only one person joined — and left after 2 minutes. → What do you tell yourself and what do you do next?",
      "7. 😂 The Joke That Landed Wrong: You made a joke in class to lighten the mood. Nobody laughed. The teacher gave you a look. Now it's just silence. → How do you recover without crawling under your desk?",
      "8. 🏫 The New Kid Assignment: A new student just joined your class mid-year. Your teacher asks YOU to be their buddy for the week. You barely know your own schedule. → How do you make them feel like they belong?",
      "9. 🌟 The Group Project Slacker:Your group presentation is tomorrow. Two members did nothing. You did everything. They still want to stand up and present with you. → What do you do — and what do you say?",
      "10. 🎯 The Tryout Rejection Email: You auditioned for the school's content creator team — the one that runs the Instagram and YouTube. You got a rejection email with zero feedback. → How do you use this as fuel, not a full stop?"
    ];

    let remaining = [...scenarios];
    let participants = {};

    function getRandomScenario() {
      if (remaining.length === 0) {
        remaining = [...scenarios];
      }
      const index = Math.floor(Math.random() * remaining.length);
      const scenario = remaining.splice(index, 1)[0];
      document.getElementById("scenario").textContent = scenario;
      document.getElementById("winnerDisplay").textContent = "";
    }

    function addParticipant() {
      const nameInput = document.getElementById("nameInput");
      const name = nameInput.value.trim();
      if (name && !participants.hasOwnProperty(name)) {
        participants[name] = 0;

        const container = document.createElement("div");

        const scoreSpan = document.createElement("div");
        scoreSpan.className = "score-display";
        scoreSpan.id = `score-${name}`;
        scoreSpan.textContent = `Score: 0`;

        const btn = document.createElement("button");
        btn.textContent = name;
        btn.className = "participant-button";
        btn.onclick = () => selectWinner(name);

        container.appendChild(scoreSpan);
        container.appendChild(btn);
        document.getElementById("participantList").appendChild(container);

        nameInput.value = "";
      }
    }

    function selectWinner(name) {
      participants[name]++;
      document.getElementById("score-" + name).textContent = `Score: ${participants[name]}`;
      document.getElementById("winnerDisplay").textContent = `${name} wins this challenge! 🎉`;
    }

    document.getElementById("selectBtn").addEventListener("click", getRandomScenario);
  </script>
</body>
</html>
