<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTaNE - Simon Says</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #111;
      color: #0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .module {
      width: 460px;
      background: #222;
      border: 12px solid #444;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
      position: relative;
    }

    .header {
      text-align: center;
      font-size: 24px;
      margin-bottom: 10px;
      color: #ff0;
    }

    .serial {
      text-align: center;
      background: #000;
      padding: 6px;
      font-size: 18px;
      margin-bottom: 8px;
      border: 2px solid #555;
    }

    .strikes {
      text-align: center;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .timer {
      font-size: 32px;
      font-weight: bold;
      color: #f00;
      text-align: center;
      background: #000;
      padding: 8px;
      border: 3px solid #f00;
      margin-bottom: 20px;
    }

    .simon-container {
      width: 280px;
      height: 280px;
      margin: 20px auto;
      position: relative;
    }

    .diamond {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 140px;
      height: 140px;
      background: #333;
      border: 8px solid #666;
    }

    .btn {
      position: absolute;
      width: 90px;
      height: 90px;
      border: 8px solid #111;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 8px 15px rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .btn.red    { background: #c00; top: 20px; left: 20px; }
    .btn.green  { background: #0a0; top: 20px; right: 20px; }
    .btn.blue   { background: #00a; bottom: 20px; left: 20px; }
    .btn.yellow { background: #cc0; bottom: 20px; right: 20px; color: black; }

    .btn:active, .btn.flash {
      transform: scale(1.15);
      filter: brightness(1.6);
      box-shadow: 0 0 25px currentColor;
    }

    .explosion {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 0, 0, 0.92);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      z-index: 10;
      border-radius: 15px;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 16px;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <div class="module">
    <div class="header">SIMON SAYS</div>
    <div class="serial">Serial: <span id="serial">ABCDEF1</span></div>
    <div class="strikes">Strikes: <span id="strikes">0</span></div>
    <div class="timer" id="timer">05:00</div>

    <div class="simon-container">
      <div class="diamond"></div>
      <div class="btn red"    data-color="red">RED</div>
      <div class="btn green"  data-color="green">GREEN</div>
      <div class="btn blue"   data-color="blue">BLUE</div>
      <div class="btn yellow" data-color="yellow">YELLOW</div>
    </div>

    <div class="status" id="status"></div>
    <div class="explosion" id="explosion">💥 BOOM! 💥</div>
  </div>

  <script>
    const timerEl = document.getElementById('timer');
    const serialEl = document.getElementById('serial');
    const strikesEl = document.getElementById('strikes');
    const statusEl = document.getElementById('status');
    const explosionEl = document.getElementById('explosion');
    const buttons = document.querySelectorAll('.btn');

    let timeLeft = 300;
    let timerInterval = null;
    let sequence = [];
    let playerInput = [];
    let strikes = 0;
    let hasVowel = true;
    let isPlaying = false;
    let currentStep = 0;

    const colors = ['red', 'green', 'blue', 'yellow'];

    // Mapping tables
    const mappingWithVowel = {
      0: { red: 'blue', blue: 'red', green: 'yellow', yellow: 'green' },
      1: { red: 'yellow', blue: 'green', green: 'blue', yellow: 'red' },
      2: { red: 'green', blue: 'red', green: 'yellow', yellow: 'blue' }
    };

    const mappingNoVowel = {
      0: { red: 'blue', blue: 'yellow', green: 'green', yellow: 'red' },
      1: { red: 'red', blue: 'blue', green: 'yellow', yellow: 'green' },
      2: { red: 'yellow', blue: 'green', green: 'blue', yellow: 'red' }
    };

    function randomSerial() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let serial = '';
      for (let i = 0; i < 5; i++) serial += letters[Math.floor(Math.random() * 26)];
      const last = Math.floor(Math.random() * 10);
      serial += last;
      serialEl.textContent = serial;

      // Check for vowel
      hasVowel = /[AEIOU]/i.test(serial);
      return serial;
    }

    function flashButton(color, duration = 400) {
      const btn = Array.from(buttons).find(b => b.dataset.color === color);
      if (!btn) return;
      
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), duration);
    }

    function playSequence() {
      isPlaying = true;
      statusEl.textContent = "Watch the sequence...";
      let i = 0;

      const interval = setInterval(() => {
        if (i < sequence.length) {
          flashButton(sequence[i]);
          i++;
        } else {
          clearInterval(interval);
          isPlaying = false;
          statusEl.textContent = "Repeat the sequence";
          playerInput = [];
        }
      }, 600);
    }

    function getMappedColor(flashedColor) {
      const strikeLevel = Math.min(strikes, 2);
      const table = hasVowel ? mappingWithVowel[strikeLevel] : mappingNoVowel[strikeLevel];
      return table[flashedColor];
    }

    function handlePlayerClick(color) {
      if (isPlaying) return;

      const expected = getMappedColor(sequence[playerInput.length]);
      playerInput.push(color);

      flashButton(color, 200);

      if (color !== expected) {
        strikes++;
        strikesEl.textContent = strikes;
        statusEl.textContent = "✘ Wrong!";
        
        if (strikes >= 3) {
          gameOver();
        } else {
          setTimeout(() => {
            playerInput = [];
            playSequence();
          }, 800);
        }
        return;
      }

      if (playerInput.length === sequence.length) {
        statusEl.textContent = "✓ Correct!";
        setTimeout(() => {
          if (sequence.length >= 8) {
            alert("✅ Simon Says module solved!");
            resetModule();
          } else {
            sequence.push(colors[Math.floor(Math.random() * colors.length)]);
            playSequence();
          }
        }, 600);
      }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timeLeft = 300;
      timerEl.textContent = "05:00";

      timerInterval = setInterval(() => {
        timeLeft--;
        const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const sec = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.textContent = `${min}:${sec}`;

        if (timeLeft <= 30) timerEl.style.color = "#ff0";
        if (timeLeft <= 0) gameOver();
      }, 1000);
    }

    function gameOver() {
      clearInterval(timerInterval);
      explosionEl.style.display = 'flex';
      setTimeout(resetModule, 1800);
    }

    function resetModule() {
      explosionEl.style.display = 'none';
      strikes = 0;
      strikesEl.textContent = "0";
      sequence = [];
      playerInput = [];
      
      randomSerial();
      
      // Start with 3 flashes
      for (let i = 0; i < 3; i++) {
        sequence.push(colors[Math.floor(Math.random() * colors.length)]);
      }
      
      startTimer();
      setTimeout(playSequence, 800);
    }

    // Button listeners
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        handlePlayerClick(btn.dataset.color);
      });
    });

    // Keyboard reset
    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r') resetModule();
    });

    // Initialize
    randomSerial();
    resetModule();
  </script>
</body>
</html>
