<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semester Survival Sprint</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; user-select: none; }
        .panel { background-color: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; font-size: 14px; }
        #boot-btn { background-color: #4f46e5; width: 100%; font-size: 16px; }
        .btn-green { background-color: #16a34a; }
        .btn-blue { background-color: #2563eb; }
        .btn-amber { background-color: #d97406; }
        .btn-red { background-color: #dc2626; }
        .bar-bg { background-color: #0f172a; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .bar-fill { background-color: #f59e0b; height: 100%; width: 100%; }
        #system-log { background-color: #000; color: #22c55e; font-family: monospace; padding: 10px; border-radius: 6px; height: 60px; overflow-y: auto; font-size: 11px; text-align: left; }
    </style>
</head>
<body>

    <h2 style="color:#818cf8; text-align: center; margin-bottom: 20px;">🎓 Semester Survival Race</h2>

    <div class="panel">
        <button id="boot-btn" class="btn">Initialize Engine</button>
    </div>

    <div class="panel" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-weight: bold;">
        <div>⏱️ TIMER: <span id="v-timer" style="color:#f59e0b;">05:00</span></div>
        <div>🏆 SCORE: <span id="v-score" style="color:#10b981;">2,000</span></div>
    </div>

    <div class="panel">
        <h3 id="v-title">Engine Inactive</h3>
        <p id="v-desc" style="color:#94a3b8; font-size:13px;">Click the main button above to load tasks.</p>
        <div class="bar-bg"><div id="v-fuse" class="bar-fill"></div></div>
    </div>

    <div class="panel" style="background:#131b2e;">
        <div class="grid">
            <button id="btn-now" class="btn btn-green">⚡ Do Now</button>
            <button id="btn-schedule" class="btn btn-blue">📅 Schedule</button>
            <button id="btn-delegate" class="btn btn-amber">🤝 Delegate</button>
            <button id="btn-ignore" class="btn btn-red">📱 TikTok</button>
        </div>
    </div>

    <div class="panel">
        <div id="system-log">> Ready.</div>
    </div>

    <script>
        var gameActive = false;
        var gameScore = 2000;
        var gameTime = 300;
        var currentFuse = 100;
        var activeTask = null;
        var gameLoop = null;

        var taskDeck = [
            { t: "Upload Essay Draft", d: "The portal closes in moments.", p: 400 },
            { t: "Fix Project Slides", d: "Your teammates left them completely blank.", p: 300 },
            { t: "Review Lecture Notes", d: "Study before core materials pile up.", p: 200 }
        ];

        function log(msg) {
            var box = document.getElementById("system-log");
            if (box) { box.innerHTML += "<br>> " + msg; box.scrollTop = box.scrollHeight; }
        }

        function setTask() {
            if (!gameActive) return;
            activeTask = taskDeck[Math.floor(Math.random() * taskDeck.length)];
            document.getElementById("v-title").innerText = activeTask.t;
            document.getElementById("v-desc").innerText = activeTask.d;
            currentFuse = 100;
            log("Loaded: " + activeTask.t);
        }

        function runTick() {
            if (!gameActive) return;
            
            // Time logic
            gameTime--;
            var m = Math.floor(gameTime / 60);
            var s = gameTime % 60;
            document.getElementById("v-timer").innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            
            if (gameTime <= 0) {
                gameActive = false;
                clearInterval(gameLoop);
                document.getElementById("v-title").innerText = "🏁 GAME OVER";
                log("Time limit reached.");
                return;
            }

            // Fuse logic
            currentFuse -= 4;
            document.getElementById("v-fuse").style.width = currentFuse + "%";
            if (currentFuse <= 0) {
                gameScore = Math.max(0, gameScore - 200);
                document.getElementById("v-score").innerText = gameScore.toLocaleString();
                log("CRISIS: Task expired!");
                setTask();
            }
        }

        function handlePress(action) {
            if (!gameActive) return;
            log("Selected strategy: " + action);
            
            if (action === 'now') { gameScore += activeTask.p; gameTime = Math.max(0, gameTime - 5); }
            if (action === 'schedule') { gameScore += Math.floor(activeTask.p * 0.8); }
            if (action === 'delegate') { gameScore = Math.max(0, gameScore - 150); }
            if (action === 'ignore') { gameScore += 100; }

            document.getElementById("v-score").innerText = gameScore.toLocaleString();
            setTask();
        }

        window.onload = function() {
            document.getElementById("boot-btn").onclick = function() {
                if (gameActive) return;
                gameActive = true;
                this.disabled = true;
                this.style.backgroundColor = "#334155";
                this.innerText = "Running...";
                log("Engine started smoothly.");
                setTask();
                gameLoop = setInterval(runTick, 1000);
            };

            document.getElementById("btn-now").onclick = function() { handlePress('now'); };
            document.getElementById("btn-schedule").onclick = function() { handlePress('schedule'); };
            document.getElementById("btn-delegate").onclick = function() { handlePress('delegate'); };
            document.getElementById("btn-ignore").onclick = function() { handlePress('ignore'); };
        };
    </script>
</body>
</html>
