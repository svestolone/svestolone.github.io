<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTaNE - Passwords</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #111;
      color: #0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .module {
      width: 560px;
      background: #222;
      border: 14px solid #444;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
      position: relative;
    }

    .header {
      text-align: center;
      font-size: 24px;
      margin-bottom: 10px;
      color: #ff0;
    }

    .timer {
      font-size: 32px;
      font-weight: bold;
      color: #f00;
      text-align: center;
      background: #000;
      padding: 8px;
      border: 3px solid #f00;
      margin-bottom: 20px;
    }

    .password-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 42px;
      font-weight: bold;
      background: #000;
      padding: 15px;
      border: 4px solid #555;
    }

    .letter-column {
      text-align: center;
    }

    .letter {
      width: 60px;
      height: 70px;
      line-height: 70px;
      background: #333;
      border: 3px solid #666;
      margin-bottom: 8px;
    }

    .up, .down {
      width: 60px;
      height: 30px;
      background: #444;
      color: #fff;
      border: 2px solid #666;
      cursor: pointer;
      font-size: 16px;
    }

    .up:hover, .down:hover { background: #666; }

    .submit {
      display: block;
      margin: 25px auto;
      padding: 15px 50px;
      font-size: 22px;
      background: #006600;
      color: white;
      border: 4px solid #0a0;
      cursor: pointer;
    }

    .submit:hover { background: #00aa00; }

    .status {
      text-align: center;
      font-size: 18px;
      min-height: 30px;
    }

    .explosion {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 0, 0, 0.92);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      z-index: 10;
      border-radius: 15px;
    }
  </style>
</head>
<body>

  <div class="module">
    <div class="header">PASSWORDS</div>
    <div class="timer" id="timer">05:00</div>

    <div class="password-display" id="display"></div>

    <div style="text-align:center;">
      <button class="submit" onclick="submitPassword()">SUBMIT</button>
    </div>

    <div class="status" id="status"></div>
    <div class="explosion" id="explosion">💥 BOOM! 💥</div>
  </div>

  <script>
    const possiblePasswords = [
      "about","after","again","below","could","every","first","found","great","house",
      "large","learn","never","other","place","plant","point","right","small","sound",
      "spell","still","study","their","there","these","thing","think","three","water",
      "where","which","world","would","write"
    ];

    let currentPassword = [];
    let timerInterval;

    function randomSetup() {
      // Pick a real password
      const correctWord = possiblePasswords[Math.floor(Math.random() * possiblePasswords.length)];
      
      // Create 5 columns with letters from the correct word + random distractors
      currentPassword = [];
      
      for (let i = 0; i < 5; i++) {
        let columnLetters = new Set();
        columnLetters.add(correctWord[i]); // Ensure correct letter is present
        
        // Add 4-5 random letters
        while (columnLetters.size < 6) {
          const randomWord = possiblePasswords[Math.floor(Math.random() * possiblePasswords.length)];
          columnLetters.add(randomWord[i]);
        }
        
        currentPassword.push({
          letters: Array.from(columnLetters).sort(),
          correct: correctWord[i],
          index: 0
        });
      }
      
      renderPassword();
    }

    function renderPassword() {
      const container = document.getElementById('display');
      container.innerHTML = '';

      currentPassword.forEach((col, pos) => {
        const column = document.createElement('div');
        column.className = 'letter-column';

        // Up button
        const up = document.createElement('button');
        up.className = 'up';
        up.textContent = '▲';
        up.onclick = () => cycleLetter(pos, -1);

        // Current letter
        const letter = document.createElement('div');
        letter.className = 'letter';
        letter.textContent = col.letters[col.index];

        // Down button
        const down = document.createElement('button');
        down.className = 'down';
        down.textContent = '▼';
        down.onclick = () => cycleLetter(pos, 1);

        column.append(up, letter, down);
        container.appendChild(column);
      });
    }

    function cycleLetter(position, direction) {
      const col = currentPassword[position];
      col.index = (col.index + direction + col.letters.length) % col.letters.length;
      renderPassword();
    }

    function submitPassword() {
      const guess = currentPassword.map(col => col.letters[col.index]).join('');
      
      if (possiblePasswords.includes(guess)) {
        document.getElementById('status').innerHTML = "✅ <span style='color:#0f0'>CORRECT PASSWORD!</span>";
        setTimeout(() => {
          alert("✅ PASSWORDS MODULE SOLVED!");
          resetModule();
        }, 600);
      } else {
        document.getElementById('status').innerHTML = "✘ Wrong password!";
        setTimeout(() => {
          document.getElementById('status').textContent = '';
        }, 1500);
      }
    }

    function startTimer() {
      let timeLeft = 300;
      const timerEl = document.getElementById('timer');

      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        timeLeft--;
        const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const sec = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.textContent = `${min}:${sec}`;

        if (timeLeft <= 30) timerEl.style.color = "#ff0";
        if (timeLeft <= 0) gameOver();
      }, 1000);
    }

    function gameOver() {
      clearInterval(timerInterval);
      document.getElementById('explosion').style.display = 'flex';
      setTimeout(resetModule, 1800);
    }

    function resetModule() {
      document.getElementById('explosion').style.display = 'none';
      document.getElementById('status').textContent = '';
      randomSetup();
      startTimer();
    }

    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r') resetModule();
    });

    // Initialize
    randomSetup();
    startTimer();
  </script>
</body>
</html>
