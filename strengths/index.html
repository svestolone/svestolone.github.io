<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendly Challenge Picker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      height: 100vh;
      background-color: #000000;
      text-align: center;
      padding: 20px;
    }
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #scenario {
      font-size: 1.5rem;
      margin: 30px;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 800px;
    }
    #selectBtn {
      background: none;
      border: none;
      cursor: pointer;
    }
    #selectBtn img {
      width: 120px;
    }
    #participants {
      width: 250px;
      text-align: left;
    }
    #participants input {
      width: 90%;
      margin: 5px 0;
      padding: 5px;
    }
    .participant-button {
      margin: 5px 0;
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }
    .participant-button:hover {
      background-color: #45a049;
    }
    .score-display {
      font-size: 0.9rem;
      color: #ffffff;
      display: inline-block;
      width: 100%;
      text-align: left;
    }
    #winnerDisplay {
      margin-top: 20px;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <h1><font color="ffffff">🎮 Friendly Challenge Scenarios</font></h1>
    <div id="scenario">Click the button to reveal your challenge!</div>
    <button id="selectBtn"><img src="select.png" alt="Select" /></button>
    <div id="winnerDisplay"></div>
  </div>

  <!-- <div id="participants">
    <h3><font color="ffffff"> Enter Participant Names:</font></h3>
    <input type="text" id="nameInput" placeholder="Enter name" />
    <button onclick="addParticipant()">Add</button>
    <div id="participantList"></div>
  </div> -->

  <script>
    const scenarios = [
    "Your K-pop cover group's centre twisted her ankle the night before the performance. The teacher says the show must go on — and since you know ALL the choreo from watching practice, you're getting pushed to centre. Tomorrow. In front of the whole school. No cap. → How do you not auto-combust?",
    "You open your bekal at lunch and it smells... strong. Like really strong. The whole table goes quiet. Someone whispers 'bro what IS that.' It's your mum's special sambal and you love it but now everyone's looking.→ How do you slay this moment instead of mager-ing into your bag?",
    "You meant to save a video of yourself singing alone in your room to your gallery. You posted it to your school's WhatsApp group instead. 47 people have seen it. Reactions are coming in.→ What's your move before this becomes your whole personality?",
    "Teacher asks a question. You KNOW the answer — or you thought you did. You shoot your hand up with full confidence and say it loud. It's completely wrong. Someone mutters 'L' under their breath. It's giving secondhand embarrassment.→ How do you not let this ratio your whole day?",
    "You've been hyping up your Mobile Legends skills to your friends for weeks. Today you finally play together and you finish with 0 kills, 11 deaths. Your friend is literally crying laughing. The screenshot is already saved. → How do you respond without being baper?",
    "You sent a paragraph to your crush on Instagram — took you 45 minutes to write. They replied with 'oh.' Just. 'oh.' Your friend group has already seen the screenshot. → How do you survive this with your dignity still slay?",
    "You're running the 100m at Sports Day. You're actually fast — but you trip at the 50m mark, full faceplant, in front of every class. Someone's parent got it on video. It's giving main character but make it tragedy. → How do you get back up — literally and figuratively?",
    "You spend the whole art class on what you think is a really deep, meaningful painting. Teacher holds it up to the class and goes 'interesting... what is it supposed to be?' Someone says it looks like burnt nasi uduk. → How do you respond without it being an L?",
    "Class karaoke session. You pick your song, you're ready, you're giving it everything. Halfway through, the lyrics on screen glitch and disappear. You have to freestyle the rest. Everyone is watching. The mic is still on. → How do you finish the song like you meant to do that?",
    "You got so excited in class you volunteered to organise the whole end-of-year class party. Alone. By yourself. The teacher said yes before you could backtrack. It's in two weeks. You have zero plan and full gabut energy. → How do you turn this chaos into something that actually slaps?"
    ];

    let remaining = [...scenarios];
    let participants = {};

    function getRandomScenario() {
      if (remaining.length === 0) {
        remaining = [...scenarios];
      }
      const index = Math.floor(Math.random() * remaining.length);
      const scenario = remaining.splice(index, 1)[0];
      document.getElementById("scenario").textContent = scenario;
      document.getElementById("winnerDisplay").textContent = "";
    }

    function addParticipant() {
      const nameInput = document.getElementById("nameInput");
      const name = nameInput.value.trim();
      if (name && !participants.hasOwnProperty(name)) {
        participants[name] = 0;

        const container = document.createElement("div");

        const scoreSpan = document.createElement("div");
        scoreSpan.className = "score-display";
        scoreSpan.id = `score-${name}`;
        scoreSpan.textContent = `Score: 0`;

        const btn = document.createElement("button");
        btn.textContent = name;
        btn.className = "participant-button";
        btn.onclick = () => selectWinner(name);

        container.appendChild(scoreSpan);
        container.appendChild(btn);
        document.getElementById("participantList").appendChild(container);

        nameInput.value = "";
      }
    }

    function selectWinner(name) {
      participants[name]++;
      document.getElementById("score-" + name).textContent = `Score: ${participants[name]}`;
      document.getElementById("winnerDisplay").textContent = `${name} wins this challenge! 🎉`;
    }

    document.getElementById("selectBtn").addEventListener("click", getRandomScenario);
  </script>
</body>
</html>
